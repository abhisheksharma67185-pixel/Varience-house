<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <radialGradient id="thinFilmBase" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#d6e9f8" />
      <stop offset="30%" stop-color="#b4d5ee" />
      <stop offset="60%" stop-color="#88b5dd" />
      <stop offset="85%" stop-color="#4d7ca6" />
      <stop offset="100%" stop-color="#234568" />
    </radialGradient>
    <linearGradient id="iridescence" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 250, 240, 0.7)" />
      <stop offset="25%" stop-color="rgba(218, 232, 245, 0.5)" />
      <stop offset="50%" stop-color="rgba(218, 214, 235, 0.6)" />
      <stop offset="75%" stop-color="rgba(241, 211, 194, 0.45)" />
      <stop offset="100%" stop-color="rgba(198, 222, 241, 0.8)" />
    </linearGradient>
    <pattern id="lattice" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255, 255, 255, 0.18)" stroke-width="1.2" />
      <circle cx="30" cy="30" r="2.5" fill="rgba(255, 255, 255, 0.35)" />
      <line x1="0" y1="0" x2="60" y2="60" stroke="rgba(255, 255, 255, 0.08)" stroke-width="0.8" />
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#thinFilmBase)" />
  <path d="M -100 -50 Q 400 300 1300 100 L 1300 1000 L -100 1000 Z" fill="url(#iridescence)" opacity="0.85" />
  <rect width="1200" height="900" fill="url(#lattice)" />

  <!-- Interference ripples -->
  <ellipse cx="480" cy="400" rx="380" ry="240" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="2.5" transform="rotate(-18 480 400)" filter="url(#glow)" />
  <ellipse cx="480" cy="400" rx="260" ry="160" fill="none" stroke="rgba(218, 232, 245, 0.5)" stroke-width="2" transform="rotate(-18 480 400)" />
  <ellipse cx="480" cy="400" rx="140" ry="85" fill="none" stroke="rgba(241, 211, 194, 0.6)" stroke-width="3" transform="rotate(-18 480 400)" />

  <!-- Luminous specular highlights -->
  <circle cx="480" cy="400" r="12" fill="#ffffff" filter="url(#glow)" />
  <circle cx="820" cy="220" r="8" fill="rgba(255, 255, 255, 0.8)" />
  <circle cx="240" cy="650" r="16" fill="rgba(198, 222, 241, 0.6)" filter="url(#glow)" />

  <text x="35" y="865" font-family="monospace" font-size="14" fill="rgba(255, 255, 255, 0.7)" letter-spacing="3">NANOMATERIAL SURFACE // AFM SCALE 20nm</text>
</svg>
