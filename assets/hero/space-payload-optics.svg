<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200">
  <defs>
    <radialGradient id="spaceBg" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1c2b3e" />
      <stop offset="60%" stop-color="#121b28" />
      <stop offset="100%" stop-color="#080e16" />
    </radialGradient>
    <linearGradient id="goldFoil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e0a0" />
      <stop offset="40%" stop-color="#d6ab52" />
      <stop offset="70%" stop-color="#ab8131" />
      <stop offset="100%" stop-color="#694d17" />
    </linearGradient>
    <linearGradient id="mirrorReflect" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(198, 222, 241, 0.85)" />
      <stop offset="50%" stop-color="rgba(255, 255, 255, 0.95)" />
      <stop offset="100%" stop-color="rgba(218, 232, 245, 0.8)" />
    </linearGradient>
    <pattern id="foilTexture" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0 10 L 10 0 L 20 10 L 10 20 Z" fill="none" stroke="rgba(0, 0, 0, 0.25)" stroke-width="0.8" />
    </pattern>
  </defs>

  <rect width="900" height="1200" fill="url(#spaceBg)" />

  <!-- Gold Thermal Protection Shield -->
  <polygon points="100,200 800,100 850,900 150,1100" fill="url(#goldFoil)" />
  <polygon points="100,200 800,100 850,900 150,1100" fill="url(#foilTexture)" opacity="0.6" />

  <!-- Primary Beryllia Mirror Segment Hexagons -->
  <g transform="translate(450, 520)">
    <polygon points="0,-140 120,-70 120,70 0,140 -120,70 -120,-70" fill="url(#mirrorReflect)" stroke="rgba(255, 255, 255, 0.8)" stroke-width="3" />
    <polygon points="-130,-220 -10,-150 -10,-10 -130,-80 -250,-10 -250,-150" fill="url(#mirrorReflect)" opacity="0.9" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" />
    <polygon points="130,-220 250,-150 250,-10 130,-80 10,-10 10,-150" fill="url(#mirrorReflect)" opacity="0.9" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" />
    <polygon points="0,150 120,220 120,360 0,430 -120,360 -120,220" fill="url(#mirrorReflect)" opacity="0.85" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" />
  </g>

  <!-- Star Tracker / Focal Plane Assembly -->
  <circle cx="450" cy="520" r="32" fill="#121b28" stroke="rgba(255, 255, 255, 0.9)" stroke-width="2.5" />
  <circle cx="450" cy="520" r="14" fill="#ffffff" />

  <text x="40" y="1150" font-family="monospace" font-size="13" fill="rgba(255, 255, 255, 0.6)" letter-spacing="3">SPACE // SATELLITE OPTICS / PAYLOAD ASY-04</text>
</svg>
