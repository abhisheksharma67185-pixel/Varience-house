<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs><radialGradient id="bg" cx="50%" cy="40%" r="78%">
<stop offset="0%" stop-color="#12211a"/><stop offset="55%" stop-color="#0c1512"/><stop offset="100%" stop-color="#070c0a"/>
</radialGradient>
<linearGradient id="scanband" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#7dd3fc" stop-opacity="0"/><stop offset="50%" stop-color="#7dd3fc" stop-opacity=".16"/><stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
</linearGradient></defs>
<style>
.ln{fill:#0e1613;stroke:#8aa69b;stroke-width:2;opacity:.85}
.lnb{fill:none;stroke:#dcefe7;stroke-width:2;opacity:.9}
.dim{fill:none;stroke:#5c7269;stroke-width:1.5;opacity:.4}
.grn{stroke:#34d399}.cyn{stroke:#7dd3fc}.amb{stroke:#fbbf24}
.fillG{fill:#34d399}.fillC{fill:#7dd3fc}.fillA{fill:#fbbf24}
.led{animation:blink 2.4s ease-in-out infinite}
.flow{stroke-dasharray:10 14;animation:flow 2.8s linear infinite}
.scan{animation:scan 5.5s ease-in-out infinite}
.pulse{animation:pulse 3s ease-in-out infinite}
.bob{animation:bob 4.5s ease-in-out infinite}
.lbl{font-family:ui-monospace,Menlo,monospace;font-size:13px;letter-spacing:4px;fill:#5f766c}
@keyframes blink{0%,100%{opacity:.12}50%{opacity:1}}
@keyframes flow{to{stroke-dashoffset:-48}}
@keyframes scan{0%,100%{opacity:.08}50%{opacity:.85}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
<rect width="800" height="600" fill="url(#bg)"/>

<circle class="dim" cx="128" cy="170" r="5" style="opacity:.55"/><circle class="dim" cx="206" cy="170" r="5" style="opacity:.55"/><circle class="dim" cx="284" cy="170" r="5" style="opacity:.55"/><circle class="dim" cx="362" cy="170" r="5" style="opacity:.55"/><circle class="dim" cx="440" cy="170" r="5" style="opacity:.55"/><circle class="fillG led" cx="518" cy="170" r="5" style="animation-delay:-4.0s"/><circle class="dim" cx="596" cy="170" r="5" style="opacity:.55"/><circle class="dim" cx="167" cy="250" r="5" style="opacity:.55"/><circle class="dim" cx="245" cy="250" r="5" style="opacity:.55"/><circle class="fillG led" cx="323" cy="250" r="5" style="animation-delay:-2.4s"/><circle class="dim" cx="401" cy="250" r="5" style="opacity:.55"/><circle class="dim" cx="479" cy="250" r="5" style="opacity:.55"/><circle class="dim" cx="557" cy="250" r="5" style="opacity:.55"/><circle class="dim" cx="635" cy="250" r="5" style="opacity:.55"/><circle class="dim" cx="128" cy="330" r="5" style="opacity:.55"/><circle class="dim" cx="206" cy="330" r="5" style="opacity:.55"/><circle class="dim" cx="284" cy="330" r="5" style="opacity:.55"/><circle class="dim" cx="362" cy="330" r="5" style="opacity:.55"/><circle class="fillG led" cx="440" cy="330" r="5" style="animation-delay:-4.8s"/><circle class="fillA led" cx="518" cy="330" r="6"/><circle class="dim" cx="596" cy="330" r="5" style="opacity:.55"/><circle class="dim" cx="167" cy="410" r="5" style="opacity:.55"/><circle class="fillG led" cx="245" cy="410" r="5" style="animation-delay:-3.2s"/><circle class="dim" cx="323" cy="410" r="5" style="opacity:.55"/><circle class="dim" cx="401" cy="410" r="5" style="opacity:.55"/><circle class="dim" cx="479" cy="410" r="5" style="opacity:.55"/><circle class="dim" cx="557" cy="410" r="5" style="opacity:.55"/><circle class="dim" cx="635" cy="410" r="5" style="opacity:.55"/>
<path class="dim" d="M206 250 L245 228 L284 250 L284 294 L245 316 L206 294 Z"/>
<path class="dim" d="M440 330 L479 308 L518 330 L518 374 L479 396 L440 374 Z"/>
<path class="dim" d="M323 170 L362 148 L401 170 L401 214 L362 236 L323 214 Z"/>
<rect x="40" y="120" width="100" height="360" fill="url(#scanband)" style="animation:scanX 7s ease-in-out infinite alternate"/>
<style>@keyframes scanX{from{transform:translateX(0)}to{transform:translateX(620px)}}</style>
<text class="lbl" x="58" y="556">ADVANCED MATERIALS / LATTICE</text>
</svg>
