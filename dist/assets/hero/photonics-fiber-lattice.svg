<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200">
  <defs>
    <radialGradient id="phoBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e324a" />
      <stop offset="60%" stop-color="#142132" />
      <stop offset="100%" stop-color="#0a121d" />
    </radialGradient>
    <filter id="pGlow">
      <feGaussianBlur stdDeviation="8" />
      <feComposite in="SourceGraphic" operator="over" />
    </filter>
  </defs>

  <rect width="900" height="1200" fill="url(#phoBg)" />

  <!-- Fiber Bundle Lines -->
  <g stroke-linecap="round" fill="none">
    <path d="M -50 1100 C 200 900 350 600 450 300" stroke="rgba(198, 222, 241, 0.4)" stroke-width="8" />
    <path d="M 50 1150 C 250 920 380 620 460 300" stroke="rgba(218, 232, 245, 0.5)" stroke-width="12" />
    <path d="M 150 1200 C 300 950 410 640 470 300" stroke="rgba(255, 250, 240, 0.6)" stroke-width="6" />
    <path d="M 950 1100 C 700 900 550 600 490 300" stroke="rgba(241, 211, 194, 0.4)" stroke-width="10" />
    <path d="M 850 1150 C 650 920 520 620 480 300" stroke="rgba(218, 214, 235, 0.5)" stroke-width="8" />
  </g>

  <!-- Luminous Fiber Core Outlets -->
  <g filter="url(#pGlow)">
    <circle cx="450" cy="300" r="18" fill="#ffffff" />
    <circle cx="460" cy="300" r="14" fill="rgba(198, 222, 241, 0.9)" />
    <circle cx="470" cy="300" r="16" fill="rgba(255, 250, 240, 0.95)" />
    <circle cx="480" cy="300" r="12" fill="rgba(218, 232, 245, 0.9)" />
    <circle cx="490" cy="300" r="15" fill="rgba(241, 211, 194, 0.85)" />
  </g>

  <text x="40" y="1150" font-family="monospace" font-size="13" fill="rgba(255, 255, 255, 0.6)" letter-spacing="3">PHOTONICS // MULTI-CHANNEL WAVEGUIDE</text>
</svg>
